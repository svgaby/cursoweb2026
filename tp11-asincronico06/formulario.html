<!DOCTYPE html>
<html lang="es-AR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="css/estilo.css">

</head>


<body>
    <div id="contenido">
        <header>
            <h1>Formulario de Contactos</h1>
        </header>
        <nav>
            <a href="#">Home</a>
            <a href="#">Nosotros</a>
            <a href="#">Otros</a>
            <a href="#">Contactos</a>
        </nav>
<form action="" method="get">
    <label for="nonbre">Nombre</label>
    <input type="text" id="nonbre" name="nombre" required placeholder="Ingrese Su Nombre">
    <label for="apellido">Apellido</label>
    <input type="text" name="" id="apellido" name="apellido" required placeholder="Ingrese Su Apellido">

<label for="DNI">D.N.I</label>
<input type="text" id="DNI" name="DNI" minlength="7" maxlength="8">
<label for="EMAIL">Correo Electronico</label>
<input type="email" name="EMAIL" id="EMAIL">
<label for="telefono">Telefono</label>
<input type="tel" name="telefono" id="telefono" value="+54911">
<label for="nacimiento">Fecha de Nacimiento</label>
<input type="date" name="nacimiento" id="nacimiento">
<label for="file">Adjuntar Archivo</label>
<input type="file" name="file" id="file">




<button type="submit">Enviar</button>
<button type="reset">Limpiar</button>



</form>


    </div>



</body>

</html>
