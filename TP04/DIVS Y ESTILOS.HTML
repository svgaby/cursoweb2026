<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIVS Y ESTILOS</title>
    <style>
        body{
            background-color: rgb(151, 151, 151);
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }
        h1{color: burlywood;
            
        }
        h2{color: white;
        }
        #boxLayout{
            margin: 16px;
            padding: 16px;
            border: 2px blue solid;
        }
        .boxSizing{
            width: 500px;
            height: 250px;
            background-color: aquamarine;
        }
        #caja3{background-color: white;}
        
    </style>
</head>
<body>
    <h1>Estilos aplicando class y id</h1>
    <h2>Box layout</h2>
    <div id="boxLayout">Box con margen, borde y padding</div>
    <h2>Box sizing</h2>
    <div class="boxSizing">Lorem ipsum dolor, sit amet consectetur adipisicing elit. Vero, eius?</div>
    <div class="boxSizing" id="caja3">Lorem ipsum dolor sit amet consectetur adipisicing elit. Omnis, quos.</div>
</body>
</html>
